---
- name: Rotate kubeadm certificates on control plane nodes
  hosts: control_plane:new_master
  become: true
  serial: 1
  tasks:
    - name: Check certificate expiration
      ansible.builtin.command: kubeadm certs check-expiration
      register: cert_check
      changed_when: false

    - name: Display current certificate status
      ansible.builtin.debug:
        msg: "{{ cert_check.stdout_lines }}"

    - name: Renew all certificates
      ansible.builtin.command: kubeadm certs renew all
      register: cert_renew
      changed_when: true

    - name: Display renewal result
      ansible.builtin.debug:
        msg: "{{ cert_renew.stdout_lines }}"

    - name: Move manifests to trigger static pod shutdown
      ansible.builtin.command: mv /etc/kubernetes/manifests /etc/kubernetes/manifests.bak
      changed_when: true

    - name: Wait for static pods to stop
      ansible.builtin.pause:
        seconds: 15

    - name: Restore manifests to restart static pods
      ansible.builtin.command: mv /etc/kubernetes/manifests.bak /etc/kubernetes/manifests
      changed_when: true

    - name: Wait for static pods to come back up
      ansible.builtin.pause:
        seconds: 30

    - name: Restart kubelet
      ansible.builtin.systemd:
        name: kubelet
        state: restarted

    - name: Wait for API server to be ready
      ansible.builtin.wait_for:
        port: 6443
        host: "{{ inventory_hostname }}"
        delay: 5
        timeout: 120

    - name: Update local kubeconfig on control plane node
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/admin/.kube/config
        remote_src: true
        owner: admin
        mode: "0600"

    - name: Verify cluster access after renewal
      ansible.builtin.command: kubectl --kubeconfig=/etc/kubernetes/admin.conf get nodes
      changed_when: false
      register: cluster_status

    - name: Display cluster status
      ansible.builtin.debug:
        msg: "{{ cluster_status.stdout_lines }}"

    - name: Verify renewed certificate expiration dates
      ansible.builtin.command: kubeadm certs check-expiration
      register: cert_check_after
      changed_when: false

    - name: Display renewed certificate status
      ansible.builtin.debug:
        msg: "{{ cert_check_after.stdout_lines }}"

- name: Distribute renewed kubeconfig to jump server
  hosts: control_plane[0]
  tasks:
    - name: Fetch admin.conf from primary control plane to Ansible controller
      ansible.builtin.fetch:
        src: /home/admin/.kube/config
        dest: /tmp/kube_config
        flat: true

- name: Update kubeconfig on jump server
  hosts: jump_server
  tasks:
    - name: Ensure .kube directory exists
      ansible.builtin.file:
        path: $HOME/.kube
        state: directory
        mode: "0755"

    - name: Copy renewed kubeconfig to jump server
      ansible.builtin.copy:
        src: /tmp/kube_config
        dest: $HOME/.kube/config
        mode: "0600"

    - name: Verify cluster access from jump server
      ansible.builtin.command: kubectl get nodes
      changed_when: false
      register: jump_cluster_status

    - name: Display cluster status from jump server
      ansible.builtin.debug:
        msg: "{{ jump_cluster_status.stdout_lines }}"
